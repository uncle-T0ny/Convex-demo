<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <radialGradient id="listen-halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e073a7" stop-opacity="0.35"/>
      <stop offset="80%" stop-color="#7e7bff" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#fdf5f1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="listen-core" cx="42%" cy="36%" r="50%">
      <stop offset="0%" stop-color="#ffdb8d"/>
      <stop offset="35%" stop-color="#ff7f6c"/>
      <stop offset="100%" stop-color="#e073a7"/>
    </radialGradient>
    <filter id="listen-glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <circle cx="60" cy="60" r="56" fill="url(#listen-halo)"/>
  <ellipse cx="60" cy="58" rx="29" ry="32" fill="url(#listen-core)" filter="url(#listen-glow)" opacity="0.95"/>
  <circle cx="50" cy="47" r="9" fill="#ffdb8d" opacity="0.35"/>
</svg>

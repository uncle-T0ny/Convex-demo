<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <radialGradient id="speak-halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e073a7" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#fdf5f1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="speak-core" cx="42%" cy="38%" r="50%">
      <stop offset="0%" stop-color="#ffdb8d"/>
      <stop offset="40%" stop-color="#ff7f6c"/>
      <stop offset="100%" stop-color="#e073a7"/>
    </radialGradient>
    <filter id="speak-glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <circle cx="60" cy="60" r="52" fill="url(#speak-halo)"/>
  <circle cx="60" cy="60" r="30" fill="url(#speak-core)" filter="url(#speak-glow)"/>
  <circle cx="60" cy="60" r="40" fill="none" stroke="#e073a7" stroke-width="1.2" opacity="0.3"/>
  <circle cx="60" cy="60" r="48" fill="none" stroke="#e073a7" stroke-width="0.8" opacity="0.15"/>
  <circle cx="51" cy="49" r="7" fill="#ffdb8d" opacity="0.25"/>
</svg>
